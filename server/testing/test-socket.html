<!DOCTYPE html>
<html>
<head>
    <title>Socket.IO Messaging Test</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; max-width: 800px; margin: 0 auto; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin: 10px 0; }
        input, button { padding: 8px; margin: 5px 0; }
        input { width: 300px; }
        .message { margin: 5px 0; padding: 5px; background: #f0f0f0; border-radius: 4px; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Live Messaging Test</h1>
    
    <div>
        <h3>Setup</h3>
        <input id="conversationId" placeholder="Conversation ID (24-char hex)" value="507f1f77bcf86cd799439011">
        <input id="senderId" placeholder="Sender ID (24-char hex)" value="507f191e810c19729de860ea">
        <input id="receiverId" placeholder="Receiver ID (24-char hex)" value="507f191e810c19729de860eb">
        <button onclick="joinRoom()">Join Room</button>
        <div id="status"></div>
    </div>

    <div>
        <h3>Send Message</h3>
        <input id="messageText" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <div>
        <h3>Messages</h3>
        <div id="messages"></div>
    </div>

    <script>
        const socket = io('http://localhost:3000');
        
        socket.on('connect', () => {
            document.getElementById('status').innerHTML = '<span class="success">✓ Connected</span>';
            console.log('Connected:', socket.id);
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerHTML = '<span class="error">✗ Disconnected</span>';
        });

        socket.on('receive_message', (data) => {
            console.log('Received message:', data);
            const messagesDiv = document.getElementById('messages');
            const msgEl = document.createElement('div');
            msgEl.className = 'message';
            msgEl.innerHTML = `
                <strong>From:</strong> ${data.senderId}<br>
                <strong>Message:</strong> ${data.message}<br>
                <small>${new Date(data.createdAt).toLocaleString()}</small>
            `;
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        });

        socket.on('error', (error) => {
            console.error('Socket error:', error);
            alert('Error: ' + error.message);
        });

        function joinRoom() {
            const conversationId = document.getElementById('conversationId').value;
            socket.emit('join_room', conversationId);
            document.getElementById('status').innerHTML = '<span class="success">✓ Joined room: ' + conversationId + '</span>';
        }

        function sendMessage() {
            const conversationId = document.getElementById('conversationId').value;
            const senderId = document.getElementById('senderId').value;
            const receiverId = document.getElementById('receiverId').value;
            const message = document.getElementById('messageText').value;

            if (!message) {
                alert('Please enter a message');
                return;
            }

            socket.emit('send_message', {
                conversationId,
                senderId,
                receiverIds: [receiverId],
                message,
                image: null
            });

            document.getElementById('messageText').value = '';
        }

        // Allow Enter key to send
        document.getElementById('messageText').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
